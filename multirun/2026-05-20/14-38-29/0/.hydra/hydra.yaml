hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - dataset_name=inet100
    - max_epochs=50
    - backbone=vit_large_patch14_224
    - batch_size=512
    - bstat_name=epps_pulley
    - bstat_num_slices=1024
    - bstat_t_max=3
    - bstat_n_points=17
    - bstat_lambda=0.05
    - embedding_dim=512
    - projector_dim=512
    - projector_arch=MLP
    - lr=0.0005
    - weight_decay=0.05
    - teacher_student=False
    - n_views=8
    - n_global_views=2
    - multi_crop=True
    - resolution=238
    - local_resolution=98
    - patch_size=14
    - patch_mask_ratio=0.3
    - autostop=False
    - drop_path_rate=0
  job:
    name: train_lejepa_ablation
    chdir: null
    override_dirname: autostop=False,backbone=vit_large_patch14_224,batch_size=512,bstat_lambda=0.05,bstat_n_points=17,bstat_name=epps_pulley,bstat_num_slices=1024,bstat_t_max=3,dataset_name=inet100,drop_path_rate=0,embedding_dim=512,local_resolution=98,lr=0.0005,max_epochs=50,multi_crop=True,n_global_views=2,n_views=8,patch_mask_ratio=0.3,patch_size=14,projector_arch=MLP,projector_dim=512,resolution=238,teacher_student=False,weight_decay=0.05
    id: '0'
    num: 0
    config_name: train_config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /media/mlinh/DATA/projects/ML/lab-3_LeJEPA/lejepa-MLProject
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: ''
      schema: structured
      provider: schema
    output_dir: /media/mlinh/DATA/projects/ML/lab-3_LeJEPA/lejepa-MLProject/multirun/2026-05-20/14-38-29/0
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
